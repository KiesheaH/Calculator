<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="favicon.png" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- CALCULATOR -->

    <div class="container">
    <!-- DISPLAY -->
      <div class="display">
        <div class="calculation">0</div>
        <div class="answer">0</div>
      </div>

      <!-- CALCULATOR BUTTONS -->
      <div class="buttons">
        <div class="row row_one">
            <button class="btn delete" data-operator="backspace">&larr;</button>
            <button class="btn clear">AC</button>
            <button class="btn percent">&percnt;</button>
            <button class="btn operand" data-operator="divide">&divide;</button>
        </div>
        <div class="row row_two">
          <button class="btn number">7</i></button>
          <button class="btn number">8</button>
          <button class="btn number">9</button>
          <button class="btn operand" data-operator="multiply">&times;</button>
        </div>
        <div class="row row_three">
          <button class="btn number">4</i></button>
          <button class="btn number">5</button>
          <button class="btn number">6</button>
          <button class="btn operand" data-operator="subtract">&minus;</button>
        </div>
        <div class="row row_four">
          <button class="btn number">1</button>
          <button class="btn number">2</button>
          <button class="btn number">3</button>
          <button class="btn operand" data-operator="add">&plus;</button>
        </div>
        <div class="row row_five">
          <button class="btn number">0</button>
          <button class="btn decimal">.</button>
          <button class="btn equal" data-operator="equal">&equals;</button>
        </div>
      </div>
    </div>

      <!-- FOOTER -->
    <footer>
      <p>Copyright &copy; <span id="copyright-year"></span> KiesheaH</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
