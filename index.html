<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="favicon.png" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body class="overlay">
    <!-- CALCULATOR -->

    <div class="container">
<!-- DISPLAY -->
      <div class="display">
        <div class="calculation">
          <p class="calculation_text"></p>
        </div>
        <div class="answer">
          <p class="answer_text"></p>
        </div>
      </div>

      <!-- CALCULATOR BUTTONS -->
      <div class="buttons">
        <div class="row row_one">
            <button class="btn special"><i class="ph ph-backspace"></i></button>
            <button class="btn special">AC</button>
            <button class="btn special">%</button>
            <button class="btn special"><i class="ph ph-divide"></i></button>
        </div>
        <div class="row row_two">
          <button class="btn number">7</i></button>
          <button class="btn number">8</button>
          <button class="btn number">9</button>
          <button class="btn special"><i class="ph ph-x"></i></button>
        </div>
        <div class="row row_three">
          <button class="btn number">4</i></button>
          <button class="btn number">5</button>
          <button class="btn number">6</button>
          <button class="btn special"><i class="ph ph-minus"></i></button>
        </div>
        <div class="row row_four">
          <button class="btn number">1</i></button>
          <button class="btn number">2</button>
          <button class="btn number">3</button>
          <button class="btn special"><i class="ph ph-plus"></i></button>
        </div>
        <div class="row row_five">
          <button class="btn number">0</button>
          <button class="btn number">.</button>
          <button class="btn number"><i class="ph ph-plus-minus"></i></button>
          <button class="btn special"><i class="ph ph-equals"></i></button>
        </div>
      </div>
      </div>

      <!-- FOOTER -->
    <footer>
      <div>Copyright &copy; 2026 KiesheaH </div>
    </footer>
  </body>
</html>
